# --- Exploration ---
action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 100000    # ← ゆっくり減らして探索期間を延長
evaluation_epsilon: 0.05    # ← ここを追加

# --- Runner & Replay ---
runner: "episode"
buffer_size: 20000             # ← バッファ増やして多様な経験を蓄積
target_update_interval_or_tau: 500  # ← ターゲットネットワーク更新頻度調整

# --- Network & Optimization ---
lr: 0.0005                       # ← 学習率を少し上げて収束速度向上を試す
hidden_dim: 128                # ← 隠れ層ユニット数を増やして表現力アップ
use_rnn: False                 # ← 繰り返し構造が必要なら True に切り替え

# 入力に付加情報を加えることで安定化
obs_agent_id: False            # ← True から False に変更
obs_last_action: False          # ← True から False に変更

# --- QMIX mixer ---
mixer: "qmix"
mixing_embed_dim: 64           # ← ミキサー内部の埋め込み次元を増加
hypernet_layers: 2             # ← 2 から 1 に変更
hypernet_embed: 128            # ← ハイパーネットの幅を拡大

# --- その他 ---
standardise_returns: False
standardise_rewards: True
agent_output_type: "q"
learner: "q_learner"
double_q: True

name: "qmix"
