# --- HAPPO specific parameters ---

# action selector設定
action_selector: "multinomial"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000
evaluation_epsilon: 0.0

runner: "episode"

buffer_size: 5000

# target networkの更新間隔
target_update_interval_or_tau: 200

# 観測設定
obs_agent_id: True
obs_last_action: True
obs_individual_obs: True

# 学習設定
standardise_returns: True
standardise_rewards: True

# エージェント設定
agent_output_type: "pi"
learner: "happo_learner"
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

# 注意機構設定
attention_heads: 4
attention_dropout: 0.1

# PPO特有のパラメータ
clip_param: 0.2
ppo_epoch: 10
num_mini_batch: 8
entropy_coef: 0.01
value_loss_coef: 1
use_max_grad_norm: True
max_grad_norm: 0.5
use_gae: True
gamma: 0.99
gae_lambda: 0.95
use_proper_time_limits: False

name: "happo"